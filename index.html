<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Site - 工具集合</title>
<style>
  :root {
    --bg: #fafafa;
    --card-bg: #ffffff;
    --text-primary: #171717;
    --text-secondary: #525252;
    --accent: #0a0a0a;
    --border: #e5e5e5;
    --hover-bg: #f5f5f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 4rem 2rem;
    flex: 1;
    width: 100%;
  }

  header {
    margin-bottom: 4rem;
  }

  h1 {
    font-size: 2.25rem;
    font-weight: 600;
    letter-spacing: -0.025em;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    font-size: 1.125rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .tools-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .tool-item {
    background: var(--card-bg);
    padding: 1.5rem 2rem;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  .tool-item:hover {
    background: var(--hover-bg);
  }

  .tool-icon {
    font-size: 1.75rem;
    flex-shrink: 0;
    width: 3rem;
    text-align: center;
  }

  .tool-content {
    flex: 1;
    min-width: 0;
  }

  .tool-title {
    font-size: 1.125rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }

  .tool-description {
    font-size: 0.9375rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .tool-arrow {
    font-size: 1.25rem;
    color: var(--text-secondary);
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .tool-item:hover .tool-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  footer {
    padding: 2rem;
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.875rem;
    border-top: 1px solid var(--border);
  }

  footer a {
    color: var(--text-primary);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease;
  }

  footer a:hover {
    border-bottom-color: var(--text-primary);
  }

  @media (max-width: 640px) {
    .container { padding: 2.5rem 1.25rem; }
    h1 { font-size: 1.75rem; }
    .tool-item { padding: 1.25rem 1.5rem; gap: 1rem; }
    .tool-icon { font-size: 1.5rem; width: 2.5rem; }
    .tool-title { font-size: 1rem; }
    .tool-description { font-size: 0.875rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Static Site</h1>
      <p class="subtitle">实用工具与计算器集合</p>
    </header>

    <nav class="tools-list" id="toolsList"></nav>
  </div>

  <footer>
    <p>&copy; 2026 Static Site · <a href="https://github.com/3223219370/static-site">GitHub</a></p>
  </footer>

  <script>
    /**
     * 工具配置数据
     * 新增工具只需在此数组中添加一项即可
     */
    const TOOLS = [
      {
        id: 'shelf-calculator',
        title: '货架DIY计算器',
        description: '在线计算货架尺寸、材料用量和成本，帮助你快速规划货架搭建方案。',
        icon: '📐',
        url: 'shelf-calculator.html'
      }
    ];

    /**
     * 渲染工具列表
     */
    function renderTools() {
      const container = document.getElementById('toolsList');
      const fragment = document.createDocumentFragment();

      TOOLS.forEach(tool => {
        const link = document.createElement('a');
        link.className = 'tool-item';
        link.href = tool.url;
        link.setAttribute('aria-label', tool.title);

        link.innerHTML = `
          <span class="tool-icon" aria-hidden="true">${tool.icon}</span>
          <div class="tool-content">
            <div class="tool-title">${tool.title}</div>
            <div class="tool-description">${tool.description}</div>
          </div>
          <span class="tool-arrow" aria-hidden="true">→</span>
        `;

        fragment.appendChild(link);
      });

      container.appendChild(fragment);
    }

    renderTools();
  </script>
</body>
</html>
